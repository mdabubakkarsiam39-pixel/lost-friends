version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: lost-friends-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: lost-friends

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lost-friends-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
    env_file:
      - ./backend/.env
    environment:
      MONGODB_URI: mongodb://mongodb:27017/lost-friends
      NODE_ENV: production

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: lost-friends-web
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    env_file:
      - ./web/.env

volumes:
  mongodb_data: